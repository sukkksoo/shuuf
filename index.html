<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Shuffler</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg: #f5f0e8;
--paper: #faf7f2;
--ink: #1a1612;
--muted: #8a8278;
--border: #d6cfc4;
--accent: #c1440e;
--accent2: #2a6b4f;
--shadow: rgba(26,22,18,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
background: var(--bg);
background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(166,148,122,0.07) 27px, rgba(166,148,122,0.07) 28px);
color: var(--ink);
font-family: 'IBM Plex Mono', monospace;
min-height: 100vh;
padding: 48px 24px 80px;
}
.container { max-width: 820px; margin: 0 auto; }
header {
margin-bottom: 40px;
border-bottom: 2px solid var(--ink);
padding-bottom: 18px;
display: flex;
align-items: baseline;
gap: 20px;
flex-wrap: wrap;
}
h1 {
font-family: 'Playfair Display', serif;
font-size: clamp(2rem, 5vw, 3.2rem);
font-weight: 700;
color: var(--ink);
letter-spacing: -0.02em;
line-height: 1;
}
h1 em { font-style: italic; color: var(--accent); }
.header-sub { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-left: auto; }
.section {
background: var(--paper);
border: 1px solid var(--border);
border-radius: 4px;
padding: 26px;
margin-bottom: 18px;
box-shadow: 2px 2px 0 var(--shadow);
}
.section-label {
font-size: 0.6rem;
letter-spacing: 0.22em;
text-transform: uppercase;
color: var(--muted);
margin-bottom: 12px;
display: flex;
align-items: center;
gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
textarea {
width: 100%;
background: var(--bg);
border: 1px solid var(--border);
border-radius: 4px;
color: var(--ink);
font-family: 'IBM Plex Mono', monospace;
font-size: 0.82rem;
line-height: 1.75;
padding: 12px 14px;
resize: vertical;
outline: none;
min-height: 120px;
transition: border-color 0.2s;
display: block;
}
textarea::placeholder { color: var(--muted); }
textarea:focus { border-color: var(--accent); }
.word-count-bar {
display: flex;
justify-content: space-between;
margin-top: 10px;
font-size: 0.65rem;
color: var(--muted);
}
.word-count-bar strong { color: var(--ink); }
.controls-row {
display: flex;
gap: 14px;
align-items: flex-end;
flex-wrap: wrap;
}
.control-group { display: flex; flex-direction: column; gap: 6px; }
.control-group label { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.number-input-wrap {
display: flex;
align-items: center;
border: 1px solid var(--border);
border-radius: 3px;
overflow: hidden;
background: var(--bg);
}
.num-btn {
width: 34px; height: 38px;
background: none; border: none;
color: var(--ink); font-size: 1.1rem;
cursor: pointer;
transition: background 0.15s;
display: flex; align-items: center; justify-content: center;
}
.num-btn:hover { background: var(--border); }
#combo-count {
width: 60px; text-align: center;
border: none; background: transparent;
font-family: 'IBM Plex Mono', monospace;
font-size: 0.9rem; font-weight: 500;
color: var(--ink); outline: none;
}
.generate-btn {
background: var(--accent); color: #fff;
border: none; border-radius: 3px;
font-family: 'IBM Plex Mono', monospace;
font-size: 0.75rem; font-weight: 500;
letter-spacing: 0.1em; padding: 0 26px;
height: 38px; cursor: pointer;
text-transform: uppercase;
transition: all 0.15s;
}
.generate-btn:hover { background: #a8380b; transform: translateY(-1px); }
.generate-btn:active { transform: none; }
.reshuffle-btn {
background: transparent; color: var(--accent2);
border: 1px solid var(--accent2); border-radius: 3px;
font-family: 'IBM Plex Mono', monospace;
font-size: 0.75rem; letter-spacing: 0.1em;
padding: 0 20px; height: 38px; cursor: pointer;
text-transform: uppercase; transition: all 0.15s;
}
.reshuffle-btn:hover { background: var(--accent2); color: #fff; }
.reshuffle-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.error-msg { font-size: 0.72rem; color: var(--accent); margin-top: 10px; display: none; }
