<!DOCTYPE html>

<style>
:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;

  padding: 12px 14px;

  outline: none;

}
textarea::placeholder { color: var(--muted); }
textarea:focus { border-color: var(--accent); }
.word-count-bar {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;

  color: var(--muted);
}
.word-count-bar strong { color: var(--ink); }

  display: flex;

.num-btn {

  width: 60px; text-align: center;

  color: var(--ink); outline: none;
}

}

.generate-btn:active { transform: none; }
.reshuffle-btn {

  border: 1px solid var(--accent2); border-radius: 3px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem; letter-spacing: 0.1em;

  text-transform: uppercase; transition: all 0.15s;
}
.reshuffle-btn:hover { background: var(--accent2); color: #fff; }
.reshuffle-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.error-msg { font-size: 0.72rem; color: var(--accent); margin-top: 10px; display: none; }
#results { display: none; flex-direction: column; }
.results-header {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
}
.results-label { font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); }

.results-meta b { color: var(--ink); }
.tab-strip {
  display: flex;
  border-bottom: 2px solid var(--border);
  margin-bottom: 22px;
}
.tab-btn {
  padding: 10px 22px; background: none; border: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all 0.15s;
}
.tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 500; }
.tab-btn:hover:not(.active) { color: var(--ink); }
.tab-panel { display: none; flex-direction: column; gap: 14px; }
.tab-panel.active { display: flex; }
.para-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 18px 22px 18px 20px;

  box-shadow: 1px 1px 0 var(--shadow);
}
#panel-24 .para-card { border-left-color: var(--accent2); }
.para-num { font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 9px; }
.para-text {
  font-family: 'Playfair Display', serif;
  font-size: 1rem; line-height: 1.9;
  color: var(--ink); word-spacing: 0.04em;
  padding-right: 70px;
}
.copy-para {
  position: absolute; top: 14px; right: 14px;
  background: none; border: 1px solid var(--border);
  border-radius: 3px; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.58rem; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 4px 10px;
  cursor: pointer; transition: all 0.15s;
}
.copy-para:hover { color: var(--ink); border-color: var(--ink); }
.copy-para.copied { color: var(--accent2); border-color: var(--accent2); }
.copy-all-wrap { margin-top: 22px; display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }
.copy-all-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 3px; font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted);
  padding: 8px 16px; cursor: pointer; transition: all 0.15s;
}
.copy-all-btn:hover { color: var(--ink); border-color: var(--ink); }
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 0.72rem;
  letter-spacing: 0.1em;
  border: 1px dashed var(--border); border-radius: 4px;
}
.empty-state .big { font-family: 'Playfair Display', serif; font-size: 2.4rem; display: block; margin-bottom: 12px; opacity: 0.25; }
.not-enough {
  font-size: 0.75rem; color: var(--muted); text-align: center;
  padding: 30px; border: 1px dashed var(--border); border-radius: 4px;
}
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Word <em>Shuffler</em></h1>
    <span class="header-sub">Random combination generator</span>
  </header>

  <div class="section">
    <div class="section-label">Your word list &mdash; space separated</div>
    <textarea id="word-input" placeholder="paste your words here separated by spaces..."></textarea>
    <div class="word-count-bar">
      <span id="word-count-display">0 words</span>
      <span id="min-warning" style="color:var(--accent);display:none;">Need at least 24 words for 24-word combinations</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Options</div>
    <div class="controls-row">

    <div class="tab-panel" id="panel-24"></div>
    <div class="copy-all-wrap">
      <button class="copy-all-btn" id="copy-all-12">Copy all 12-word</button>
      <button class="copy-all-btn" id="copy-all-24">Copy all 24-word</button>
    </div>
  </div>

  <div class="empty-state" id="empty-state">

  </div>

</div>
<script>
(function() {
  var wordPool = [];
  var lastCount = 5;

function el(id) { return document.getElementById(id); }

function parseWords(text) {
return text.trim().split(/\s+/).filter(function(w) { return w.length > 0; });
}

function getCount() {
var val = parseInt(el(‘combo-count’).value);
return isNaN(val) ? 5 : Math.max(1, Math.min(200, val));
}

function shuffleArr(arr) {
var a = arr.slice();
for (var i = a.length - 1; i > 0; i–) {
var j = Math.floor(Math.random() * (i + 1));
var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
}
return a;
}

function randomCombo(words, n) {
return shuffleArr(words).slice(0, n).join(’ ’);
}

function renderPanel(panelId, combos, size, empty) {
var panel = el(panelId);
panel.innerHTML = ‘’;
if (empty) {
var d = document.createElement(‘div’);
d.className = ‘not-enough’;
d.innerHTML = ‘Add at least <strong>24 words</strong> to unlock 24-word combinations.’;
panel.appendChild(d);
return;
}
for (var i = 0; i < combos.length; i++) {
var text = combos[i];
var card = document.createElement(‘div’);
card.className = ‘para-card’;
  var num = document.createElement('div');
  num.className = 'para-num';
  num.textContent = 'Combination ' + (i + 1) + ' \u00B7 ' + size + ' words';

  var pt = document.createElement('div');
  pt.className = 'para-text';
  pt.textContent = text;

  var cb = document.createElement('button');
  cb.className = 'copy-para';
  cb.textContent = 'Copy';
  (function(btn, t) {
    btn.addEventListener('click', function() {
      navigator.clipboard.writeText(t).then(function() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
      });
    });
  })(cb, text);

  card.appendChild(num);
  card.appendChild(pt);
  card.appendChild(cb);
  panel.appendChild(card);
}

}

function renderResults() {
var count = lastCount;
var has24 = wordPool.length >= 24;
var c12 = [];
for (var i = 0; i < count; i++) c12.push(randomCombo(wordPool, 12));

var c24 = [];
if (has24) {
  for (var i = 0; i < count; i++) c24.push(randomCombo(wordPool, 24));
}

renderPanel('panel-12', c12, 12, false);
renderPanel('panel-24', c24, 24, !has24);

el('results-meta').innerHTML = '<b>' + count + ' combo' + (count !== 1 ? 's' : '') + ' &middot; ' + wordPool.length + ' words in pool</b>';
el('tab12').textContent = '12-Word (' + count + ')';
el('tab24').textContent = has24 ? '24-Word (' + count + ')' : '24-Word (need ' + (24 - wordPool.length) + ' more)';

el('results').style.display = 'flex';
el('empty-state').style.display = 'none';

}

function generate() {
var errEl = el(‘error-msg’);
errEl.style.display = ‘none’;

if (words.length < 12) {
errEl.textContent = ‘Please enter at least 12 words to generate combinations.’;
errEl.style.display = ‘block’;
return;
}
wordPool = words;
lastCount = getCount();
renderResults();
el(‘reshuffle-btn’).disabled = false;
}

// Word count listener
el(‘word-input’).addEventListener(‘input’, function() {
var words = parseWords(this.value);
el(‘word-count-display’).innerHTML = ‘<strong>’ + words.length + ‘</strong> word’ + (words.length !== 1 ? ‘s’ : ‘’);
el(‘min-warning’).style.display = (words.length > 0 && words.length < 24) ? ‘inline’ : ‘none’;
});

// Buttons
el(‘btn-minus’).addEventListener(‘click’, function() {
var input = el(‘combo-count’);
input.value = Math.max(1, (parseInt(input.value) || 5) - 1);
});
el(‘btn-plus’).addEventListener(‘click’, function() {
var input = el(‘combo-count’);
input.value = Math.min(200, (parseInt(input.value) || 5) + 1);
});
el(‘gen-btn’).addEventListener(‘click’, generate);
el(‘reshuffle-btn’).addEventListener(‘click’, function() {
if (!wordPool.length) return;
lastCount = getCount();
renderResults();
});
el(‘combo-count’).addEventListener(‘keydown’, function(e) {
if (e.key === ‘Enter’) generate();
});

// Tabs
el(‘tab12’).addEventListener(‘click’, function() {
el(‘tab12’).classList.add(‘active’); el(‘tab24’).classList.remove(‘active’);
el(‘panel-12’).classList.add(‘active’); el(‘panel-24’).classList.remove(‘active’);
});
el(‘tab24’).addEventListener(‘click’, function() {
el(‘tab24’).classList.add(‘active’); el(‘tab12’).classList.remove(‘active’);
el(‘panel-24’).classList.add(‘active’); el(‘panel-12’).classList.remove(‘active’);
});

// Copy all
el(‘copy-all-12’).addEventListener(‘click’, function() {
var els = el(‘panel-12’).querySelectorAll(’.para-text’);
var texts = [];
for (var i = 0; i < els.length; i++) texts.push(els[i].textContent);
if (texts.length) navigator.clipboard.writeText(texts.join(’\n\n’));
});
el(‘copy-all-24’).addEventListener(‘click’, function() {
var els = el(‘panel-24’).querySelectorAll(’.para-text’);
var texts = [];
for (var i = 0; i < els.length; i++) texts.push(els[i].textContent);
if (texts.length) navigator.clipboard.writeText(texts.join(’\n\n’));
});

})();
</script>
